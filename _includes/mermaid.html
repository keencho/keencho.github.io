<!--
  mermaid-js loader (v11, ESM) + AWS 아이콘 팩 (architecture-beta)
-->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  /* architecture-beta 다이어그램용 AWS 아이콘 팩 (로컬 호스팅, 855개).
     initialize 전에 등록해야 함. flowchart/sequence 엔 영향 없음. */
  mermaid.registerIconPacks([{
    name: 'aws',
    loader: () =>
      fetch('{{ "/assets/data/aws-icons.json" | relative_url }}').then((res) => res.json())
  }]);

  function themeNow() {
    const m = document.documentElement.getAttribute('data-mode');
    const dark =
      m === 'dark' ||
      (m === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
    return dark ? 'dark' : 'default';
  }

  /* Markdown 코드블록(```mermaid)을 .mermaid div 로 옮긴다.
     원본 소스를 data-source 에 보관 — 다크모드 토글 시 재렌더에 사용. */
  document.querySelectorAll('pre > code.language-mermaid').forEach((code) => {
    const pre = code.parentElement;
    const src = code.textContent;
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.dataset.source = src;
    div.textContent = src;
    pre.classList.add('unloaded');
    pre.after(div);
  });

  async function renderAll() {
    mermaid.initialize({ startOnLoad: false, theme: themeNow() });
    document.querySelectorAll('div.mermaid').forEach((div) => {
      div.removeAttribute('data-processed');
      div.innerHTML = div.dataset.source;
    });
    await mermaid.run({ querySelector: 'div.mermaid' });
  }

  await renderAll();

  /* 다크/라이트 토글 시 색이 따라오도록 재렌더 (Chirpy ModeToggle 메시지) */
  window.addEventListener('message', (e) => {
    const toggleId = typeof ModeToggle !== 'undefined' ? ModeToggle.ID : 'mode-toggle';
    if (e.source === window && e.data && e.data.direction === toggleId) {
      renderAll();
    }
  });
</script>
